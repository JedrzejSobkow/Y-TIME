{% extends 'base.html' %}
{% load static %}

{% block title %}
  Panel znajomych
{% endblock %}

{% block content %}
  <div class="friends-panel">
    <h1>Panel znajomych</h1>

    <div class="tabs">
      <button class="tab-btn active" data-url="{% url 'friends_list' %}">Znajomi</button>
      <button class="tab-btn" data-url="{% url 'pending_list' %}">Oczekujące</button>
      <button class="tab-btn" data-url="{% url 'sent_list' %}">Wysłane</button>
    </div>

    <div id="tab-content" class="tab-content"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const tabs = document.querySelectorAll('.tab-btn')
      const contentDiv = document.getElementById('tab-content')
    
      function refreshActiveTab() {
        const activeTab = document.querySelector('.tab-btn.active')
        if (activeTab) loadTab(activeTab.dataset.url)
      }
    
      function attachButtonHandlers() {
        const actionConfigs = [
          { selector: '.btn-accept', urlPrefix: '/friends/request/accept/' },
          { selector: '.btn-reject', urlPrefix: '/friends/request/reject/' },
          { selector: '.btn-cancel', urlPrefix: '/friends/request/cancel/' },
          { selector: '.btn-remove', urlPrefix: '/friends/remove/' },
        ]
    
        actionConfigs.forEach(({ selector, urlPrefix }) => {
          document.querySelectorAll(selector).forEach((btn) => {
            btn.addEventListener('click', function () {
              const id = this.dataset.requestId || this.dataset.friendId
              const url = `${urlPrefix}${id}/`
    
              postJson(url)
                .then((response) => response.json())
                .then((data) => {
                  if (data.success) refreshActiveTab()
                })
            })
          })
        })
      }
    
      function loadTab(url) {
        contentDiv.innerHTML = '<div class="loader">Ładowanie...</div>'
    
        fetch(url, {
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
          .then((response) => {
            if (!response.ok) throw new Error('Błąd sieci')
            return response.text()
          })
          .then((html) => {
            contentDiv.innerHTML = html
            attachButtonHandlers()
          })
          .catch((error) => {
            contentDiv.innerHTML = '<div class="error">Wystąpił błąd ładowania</div>'
            console.error(error)
          })
      }
    
      tabs.forEach((tab) => {
        tab.addEventListener('click', function () {
          tabs.forEach((t) => t.classList.remove('active'))
          this.classList.add('active')
          loadTab(this.dataset.url)
        })
      })
    
      if (tabs.length > 0) {
        loadTab(tabs[0].dataset.url)
      }
    })
  </script>

{% endblock %}
