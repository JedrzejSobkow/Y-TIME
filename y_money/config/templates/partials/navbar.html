<!-- config/templates/partials/navbar.html -->
{% load static %}

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="{% static 'images/y_money_logo.png' %}" height="50" alt="" />
      <span class="mx-2 mb-0 fw-bold h4">Y-money</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if '/home' in request.path %}active{% endif %}" href="/home">Panel główny</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/transactions/add/' in request.path %}active{% endif %}" href="/transactions/add/">Wpływy i Wydatki</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/my-finances' in request.path %}active{% endif %}" href="/my-finances">Moje finanse</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/goals' in request.path %}active{% endif %}" href="/goals">Cele</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/users/friends/' in request.path %}active{% endif %}" href="/users/friends">Znajomi</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
              Wyloguj
          </a>
          <form id="logout-form" method="post" action="{% url 'logout' %}" style="display: none;">
              {% csrf_token %}
          </form>
      </li>
      </ul>
    </div>
  </div>
</nav>
